apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
spec:
  serviceName: mongo
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mongo
              topologyKey: "kubernetes.io/hostname"
      initContainers:
        - name: init-keyfile
          image: alpine:latest
          command: 
            - sh
            - -c
            - "cp /mnt/keyfile /data/db/keyfile && chmod 600 /data/db/keyfile && chown 999:999 /data/db/keyfile"
          volumeMounts:
            - name: mongo-keyfile
              mountPath: /mnt
            - name: data
              mountPath: /data/db
      containers:
        - name: mongo
          image: mongo:8.0
          args:
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            - "--auth"
            - "--keyFile=/data/db/keyfile"
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: mongo-keyfile
          secret:
            secretName: mongo-keyfile
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

