apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init
spec:
  template:
    metadata:
      labels:
        job: mongo-init
    spec:
      containers:
        - name: init
          image: mongo:8.0
          command:
            - mongosh
            - "--eval"
            - |
              try {
                rs.status();
                print("Replica set already initiated");
              } catch (e) {
                rs.initiate({
                  _id: "rs0",
                  members: [
                    { _id: 0, host: "192.168.122.200:27017" },
                    { _id: 1, host: "192.168.122.201:27017" },
                    { _id: 2, host: "192.168.122.202:27017" }
                  ]
                });
              }
      restartPolicy: OnFailure

